<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>임장노트 — 대시보드</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;500;700;900&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
<style>
:root {
  --bg: #f5f2ee;
  --surf: #ffffff;
  --surf2: #faf8f5;
  --surf3: #f0ece6;
  --surf4: #e8e2da;
  --border: #ddd8d0;
  --accent: #e8457a;
  --accent-glow: #e8457a18;
  --gold: #e8a020;
  --gold-dim: #e8a02018;
  --green: #28a87a;
  --green-dim: #28a87a15;
  --red: #e83448;
  --red-dim: #e8344815;
  --purple: #8460f5;
  --purple-dim: #8460f515;
  --text: #1a1614;
  --text2: #5a5250;
  --text3: #a09890;
  --r: 12px;
  --r-sm: 8px;

  --color-untouched: #f0ece6;
  --color-exploring: #d4edda;
  --color-pending: #fde8be;
  --color-conquered: #c8dcf5;
}
* { box-sizing: border-box; margin: 0; padding: 0; }
body {
  font-family: 'Noto Sans KR', sans-serif;
  background: var(--bg);
  background-image:
    linear-gradient(rgba(0,0,0,0.05) 1px, transparent 1px),
    linear-gradient(90deg, rgba(0,0,0,0.05) 1px, transparent 1px);
  background-size: 28px 28px;
  color: var(--text);
  height: 100vh;
  overflow: hidden;
  display: flex;
  flex-direction: column;
  font-size: 14px;
}

/* ─── TOP NAV ─── */
.topnav {
  height: 52px; min-height: 52px;
  background: var(--surf);
  border-bottom: 1px solid var(--border);
  display: flex; align-items: center; justify-content: space-between;
  padding: 0 24px; flex-shrink: 0;
}
.topnav-logo { font-size: 16px; font-weight: 900; color: var(--text); letter-spacing: -0.5px; }
.nav-links { display: flex; gap: 6px; }
.nav-link {
  padding: 6px 16px; border-radius: 9999px; font-size: 13px;
  color: var(--text2); text-decoration: none; cursor: pointer;
  transition: all 0.15s; border: none; background: none; font-family: inherit; font-weight: 500;
}
.nav-link:hover { background: var(--surf3); color: var(--text); }
.nav-link.here { background: var(--accent); color: #fff; font-weight: 600; box-shadow: 0 2px 8px var(--accent-glow); }

/* ─── STATS BAR ─── */
.stats-bar {
  background: var(--surf);
  border-bottom: 1px solid var(--border);
  display: flex; align-items: center;
  padding: 0 24px; gap: 0; flex-shrink: 0; height: 52px;
}
.stat-item {
  padding: 0 20px; border-right: 1px solid var(--border);
  display: flex; align-items: center; gap: 10px;
}
.stat-item:first-child { padding-left: 0; }
.stat-num { font-size: 22px; font-weight: 700; line-height: 1; }
.stat-label { font-size: 11px; color: var(--text3); line-height: 1.3; }
.conquest-bar-wrap {
  flex: 1; margin-left: 20px;
  display: flex; align-items: center; gap: 12px;
}
.conquest-label { font-size: 12px; color: var(--text2); white-space: nowrap; }
.conquest-bar-bg {
  flex: 1; height: 6px; background: var(--surf3); border-radius: 3px; overflow: hidden;
}
.conquest-bar-fill {
  height: 100%; background: linear-gradient(90deg, var(--accent), var(--gold));
  border-radius: 3px; transition: width 0.8s ease;
}
.conquest-pct { font-size: 13px; font-weight: 700; color: var(--gold); white-space: nowrap; }

/* ─── VIEWS CONTAINER ─── */
.views-container { flex: 1; overflow: hidden; display: flex; }
.view { display: none; width: 100%; height: 100%; }
.view.active { display: flex; }

/* ─── DASHBOARD VIEW ─── */
#view-dashboard { flex-direction: row; }

.map-area {
  flex: 1; position: relative;
  background: var(--bg);
  display: flex; align-items: center; justify-content: center;
  overflow: hidden;
}
.map-container { position: relative; width: 100%; height: 100%; }
#seoul-svg { width: 100%; height: 100%; object-fit: contain; }
.map-overlay-label {
  position: absolute; top: 16px; left: 16px;
  font-size: 11px; color: var(--text3);
  display: flex; gap: 12px;
}
.legend-item { display: flex; align-items: center; gap: 5px; }
.legend-dot { width: 10px; height: 10px; border-radius: 2px; }

.side-panel {
  width: 380px; min-width: 380px;
  border-left: 1px solid var(--border);
  background: var(--surf);
  display: flex; flex-direction: column;
  overflow: hidden;
}
.side-tabs { display: flex; border-bottom: 1px solid var(--border); flex-shrink: 0; }
.side-tab {
  flex: 1; padding: 12px 8px; text-align: center; font-size: 12px;
  color: var(--text3); cursor: pointer; border-bottom: 2px solid transparent;
  transition: all 0.15s;
}
.side-tab:hover { color: var(--text2); }
.side-tab.active { color: var(--accent); border-bottom-color: var(--accent); font-weight: 500; }
.side-content { flex: 1; overflow-y: auto; padding: 20px; }
.side-content::-webkit-scrollbar { width: 4px; }
.side-content::-webkit-scrollbar-thumb { background: var(--surf3); border-radius: 2px; }

.dong-header { margin-bottom: 18px; }
.dong-title { font-size: 20px; font-weight: 700; margin-bottom: 6px; }
.dong-badges { display: flex; gap: 6px; flex-wrap: wrap; }
.badge { font-size: 11px; padding: 3px 10px; border-radius: 20px; background: var(--surf3); color: var(--text2); }
.badge.accent { background: var(--accent-glow); color: var(--accent); }
.badge.gold { background: var(--gold-dim); color: var(--gold); }
.badge.green { background: var(--green-dim); color: var(--green); }

.info-section { margin-bottom: 20px; }
.info-section-title {
  font-size: 11px; color: var(--text3); font-weight: 600;
  text-transform: uppercase; letter-spacing: 0.8px; margin-bottom: 10px;
}
.info-block { background: var(--surf2); border-radius: var(--r-sm); padding: 12px 14px; font-size: 13px; color: var(--text); line-height: 1.6; }
.tag-list { display: flex; flex-wrap: wrap; gap: 5px; }
.tag { padding: 3px 10px; border-radius: 20px; font-size: 11px; background: var(--surf3); color: var(--text2); }
.tag.subway { background: #1a2d50; color: #90bdf7; }
.tag.park { background: #1a2e1a; color: #90d790; }
.tag.risk { background: #2e1a1a; color: #f09090; }
.tag.pro { background: #1a2e1a; color: var(--green); }

.unit-mini-card {
  background: var(--surf2); border: 1px solid var(--border);
  border-radius: var(--r-sm); padding: 12px 14px; margin-bottom: 8px;
  cursor: pointer; transition: border-color 0.15s;
}
.unit-mini-card:hover { border-color: var(--accent); }
.unit-mini-top { display: flex; justify-content: space-between; align-items: center; margin-bottom: 6px; }
.unit-mini-name { font-size: 14px; font-weight: 600; }

.action-btn {
  width: 100%; padding: 10px; border-radius: var(--r-sm);
  border: 1px solid var(--border); background: var(--surf2);
  color: var(--text2); cursor: pointer; font-family: inherit; font-size: 13px;
  transition: all 0.15s; margin-top: 8px; text-decoration: none; display: block; text-align: center;
}
.action-btn:hover { background: var(--surf3); color: var(--text); border-color: var(--accent); }
.action-btn.primary { background: var(--accent-glow); border-color: var(--accent); color: var(--accent); }

.chart-wrap { background: var(--surf2); border-radius: var(--r-sm); padding: 14px; margin-bottom: 16px; }

.empty-side {
  display: flex; flex-direction: column; align-items: center; justify-content: center;
  height: 100%; color: var(--text3); text-align: center; padding: 40px;
}
.empty-side .icon { font-size: 40px; margin-bottom: 12px; }
.empty-side p { font-size: 13px; line-height: 1.7; }

.dong-region { cursor: pointer; transition: opacity 0.2s; }
.dong-region:hover { opacity: 0.75; }

/* ─── MODAL ─── */
.modal-bg {
  display: none; position: fixed; inset: 0; background: #00000088;
  z-index: 100; align-items: center; justify-content: center;
}
.modal-bg.open { display: flex; }
.modal {
  background: var(--surf); border: 1px solid var(--border);
  border-radius: 16px; width: 640px; max-height: 85vh;
  overflow-y: auto; padding: 28px;
}
.modal-head { display: flex; justify-content: space-between; margin-bottom: 22px; }
.modal-title { font-size: 20px; font-weight: 700; }
.modal-close { background: none; border: none; color: var(--text3); cursor: pointer; font-size: 20px; }
.info-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
.info-cell { background: var(--surf2); border-radius: 8px; padding: 11px 14px; }
.info-key { font-size: 11px; color: var(--text3); margin-bottom: 4px; }
.info-val { font-size: 14px; font-weight: 500; }

/* ─── TOAST ─── */
.toast {
  position: fixed; top: 20px; right: 24px; z-index: 200;
  background: var(--green); color: #fff; font-size: 13px; font-weight: 500;
  padding: 10px 18px; border-radius: var(--r-sm);
  opacity: 0; pointer-events: none; transition: opacity 0.3s;
}
.toast.show { opacity: 1; }

/* ─────────────────────────────────────────
   📘 GLOSSARY VIEW
───────────────────────────────────────── */
#view-glossary {
  flex-direction: row;
  overflow: hidden;
}

.glossary-sidebar {
  width: 320px; min-width: 320px;
  border-right: 1px solid var(--border);
  background: var(--surf);
  display: flex; flex-direction: column;
  overflow-y: auto;
  padding: 24px;
  flex-shrink: 0;
}
.glossary-sidebar::-webkit-scrollbar { width: 4px; }
.glossary-sidebar::-webkit-scrollbar-thumb { background: var(--surf3); border-radius: 2px; }

.glossary-main {
  flex: 1;
  display: flex; flex-direction: column;
  overflow: hidden;
  background: var(--bg);
}

.glossary-toolbar {
  padding: 16px 24px;
  background: var(--surf);
  border-bottom: 1px solid var(--border);
  flex-shrink: 0;
  display: flex; flex-direction: column; gap: 12px;
}

.search-input {
  width: 100%;
  padding: 9px 14px;
  background: var(--surf2);
  border: 1px solid var(--border);
  border-radius: var(--r-sm);
  color: var(--text);
  font-family: inherit;
  font-size: 13px;
  outline: none;
  transition: border-color 0.15s;
}
.search-input:focus { border-color: var(--accent); }
.search-input::placeholder { color: var(--text3); }

.consonant-filter {
  display: flex; flex-wrap: wrap; gap: 5px;
}
.conso-btn {
  padding: 4px 10px; border-radius: 20px; font-size: 12px;
  background: var(--surf2); border: 1px solid var(--border);
  color: var(--text2); cursor: pointer; transition: all 0.15s;
  font-family: inherit;
}
.conso-btn:hover { background: var(--surf3); color: var(--text); }
.conso-btn.active { background: var(--accent-glow); border-color: var(--accent); color: var(--accent); font-weight: 500; }

.glossary-cards {
  flex: 1; overflow-y: auto;
  padding: 20px 24px;
  display: flex; flex-direction: column; gap: 10px;
}
.glossary-cards::-webkit-scrollbar { width: 4px; }
.glossary-cards::-webkit-scrollbar-thumb { background: var(--surf3); border-radius: 2px; }

.glossary-card {
  background: var(--surf);
  border: 1px solid var(--border);
  border-radius: var(--r);
  padding: 14px 16px;
  display: flex; align-items: flex-start; gap: 14px;
  transition: border-color 0.15s;
}
.glossary-card:hover { border-color: var(--surf4); }
.glossary-card-initial {
  font-size: 20px; font-weight: 900;
  color: var(--text3);
  min-width: 28px; text-align: center;
  line-height: 1.3;
}
.glossary-card-body { flex: 1; min-width: 0; }
.glossary-card-term {
  font-size: 15px; font-weight: 700;
  margin-bottom: 5px;
  display: flex; align-items: center; gap: 8px;
}
.glossary-card-meaning {
  font-size: 13px; color: var(--text2); line-height: 1.6;
}
.glossary-card-actions {
  display: flex; gap: 6px; align-items: center; flex-shrink: 0;
}
.icon-btn {
  background: none; border: none; cursor: pointer;
  color: var(--text3); font-size: 14px; padding: 4px;
  border-radius: 4px; transition: all 0.15s;
}
.icon-btn:hover { color: var(--text); background: var(--surf3); }
.icon-btn.danger:hover { color: var(--red); }

.cat-chip {
  display: inline-block;
  font-size: 10px; padding: 2px 8px; border-radius: 20px;
  font-weight: 500;
}
.cat-chip.general { background: var(--accent-glow); color: var(--accent); }
.cat-chip.policy { background: var(--purple-dim); color: var(--purple); }

.glossary-empty {
  display: flex; flex-direction: column; align-items: center; justify-content: center;
  height: 100%; color: var(--text3); text-align: center;
}
.glossary-empty .icon { font-size: 40px; margin-bottom: 12px; }

/* Glossary form */
.form-group { margin-bottom: 16px; }
.form-label {
  font-size: 11px; color: var(--text3); font-weight: 600;
  text-transform: uppercase; letter-spacing: 0.6px;
  display: block; margin-bottom: 6px;
}
.form-input, .form-textarea, .form-select {
  width: 100%;
  padding: 9px 12px;
  background: var(--surf2);
  border: 1px solid var(--border);
  border-radius: var(--r-sm);
  color: var(--text);
  font-family: inherit;
  font-size: 13px;
  outline: none;
  transition: border-color 0.15s;
}
.form-input:focus, .form-textarea:focus, .form-select:focus { border-color: var(--accent); }
.form-textarea { resize: vertical; min-height: 80px; line-height: 1.5; }
.form-select { appearance: none; cursor: pointer; }
.form-select option { background: var(--surf2); }

.submit-btn {
  width: 100%; padding: 11px;
  background: var(--accent);
  border: none; border-radius: var(--r-sm);
  color: #fff; font-family: inherit; font-size: 13px; font-weight: 600;
  cursor: pointer; transition: opacity 0.15s;
}
.submit-btn:hover { opacity: 0.85; }

.section-title {
  font-size: 16px; font-weight: 700;
  margin-bottom: 20px;
  padding-bottom: 12px;
  border-bottom: 1px solid var(--border);
}

/* ─────────────────────────────────────────
   ⚖️ POLICY VIEW
───────────────────────────────────────── */
#view-policy {
  flex-direction: column;
  overflow: hidden;
}

.policy-topbar {
  background: var(--surf);
  border-bottom: 1px solid var(--border);
  padding: 14px 28px;
  display: flex; align-items: center; justify-content: space-between;
  flex-shrink: 0;
  gap: 16px;
}

.policy-topbar-left { display: flex; align-items: center; gap: 16px; }

.toggle-label {
  display: flex; align-items: center; gap: 10px;
  cursor: pointer; user-select: none;
  font-size: 13px; color: var(--text2);
}
.toggle-label:hover { color: var(--text); }
.toggle-switch-input { display: none; }
.toggle-slider {
  width: 38px; height: 20px;
  background: var(--surf3);
  border-radius: 10px;
  position: relative;
  transition: background 0.2s;
  flex-shrink: 0;
}
.toggle-slider::after {
  content: '';
  position: absolute;
  width: 14px; height: 14px;
  background: var(--text3);
  border-radius: 50%;
  top: 3px; left: 3px;
  transition: transform 0.2s, background 0.2s;
}
.toggle-switch-input:checked + .toggle-slider {
  background: var(--gold-dim);
  border: 1px solid var(--gold);
}
.toggle-switch-input:checked + .toggle-slider::after {
  transform: translateX(18px);
  background: var(--gold);
}

.policy-add-btn {
  padding: 8px 16px;
  background: var(--accent-glow);
  border: 1px solid var(--accent);
  border-radius: var(--r-sm);
  color: var(--accent); font-family: inherit; font-size: 13px; font-weight: 500;
  cursor: pointer; transition: all 0.15s;
}
.policy-add-btn:hover { background: var(--accent); color: #fff; }

.policy-content {
  flex: 1; overflow-y: auto;
  padding: 28px;
  display: flex; flex-direction: column; gap: 0;
}
.policy-content::-webkit-scrollbar { width: 6px; }
.policy-content::-webkit-scrollbar-thumb { background: var(--surf3); border-radius: 3px; }

/* Timeline admin group */
.admin-group { margin-bottom: 36px; }
.admin-header {
  display: flex; align-items: center; gap: 12px;
  margin-bottom: 16px;
}
.admin-dot {
  width: 14px; height: 14px; border-radius: 50%;
  background: var(--accent);
  flex-shrink: 0;
  box-shadow: 0 0 8px var(--accent);
}
.admin-name {
  font-size: 15px; font-weight: 700;
}
.admin-period {
  font-size: 12px; color: var(--text3);
}

/* Vertical timeline line */
.timeline-track {
  margin-left: 6px;
  padding-left: 28px;
  border-left: 2px solid var(--border);
  display: flex; flex-direction: column; gap: 12px;
}

.policy-card {
  background: var(--surf);
  border: 1px solid var(--border);
  border-radius: var(--r);
  padding: 14px 18px;
  position: relative;
  transition: border-color 0.15s, opacity 0.3s;
}
.policy-card::before {
  content: '';
  position: absolute;
  left: -35px; top: 50%;
  transform: translateY(-50%);
  width: 8px; height: 8px;
  border-radius: 50%;
  background: var(--surf4);
  border: 2px solid var(--border);
}
.policy-card:hover { border-color: var(--surf4); }
.policy-card.active-policy { border-left: 3px solid var(--green); }
.policy-card.active-policy::before { background: var(--green); border-color: var(--green); }

/* Abolished policy styles */
.policy-card.abolished {
  opacity: 0.38;
}
.policy-card.abolished .policy-name {
  text-decoration: line-through;
  text-decoration-color: var(--text3);
}

.policy-card-head {
  display: flex; align-items: flex-start; justify-content: space-between;
  margin-bottom: 8px; gap: 12px;
}
.policy-name { font-size: 14px; font-weight: 700; }
.policy-status-badge {
  font-size: 10px; padding: 3px 9px; border-radius: 20px;
  flex-shrink: 0; font-weight: 500;
}
.policy-status-badge.active { background: var(--green-dim); color: var(--green); }
.policy-status-badge.abolished { background: var(--red-dim); color: var(--red); }

.policy-meta {
  display: flex; align-items: center; gap: 14px;
  font-size: 12px; color: var(--text3);
}
.policy-memo {
  margin-top: 8px; font-size: 12px; color: var(--text2); line-height: 1.6;
}
.policy-card-actions {
  display: flex; gap: 4px; margin-top: 10px;
}

/* Policy add modal */
.policy-modal {
  background: var(--surf); border: 1px solid var(--border);
  border-radius: 16px; width: 520px; max-height: 85vh;
  overflow-y: auto; padding: 28px;
}

/* Admin color dots */
.admin-dot-0 { background: var(--accent); box-shadow: 0 0 8px var(--accent); }
.admin-dot-1 { background: var(--gold); box-shadow: 0 0 8px var(--gold); }
.admin-dot-2 { background: var(--purple); box-shadow: 0 0 8px var(--purple); }
.admin-dot-3 { background: var(--green); box-shadow: 0 0 8px var(--green); }
.admin-dot-4 { background: var(--red); box-shadow: 0 0 8px var(--red); }

.policy-empty {
  display: flex; flex-direction: column; align-items: center; justify-content: center;
  min-height: 300px; color: var(--text3); text-align: center;
}
.policy-empty .icon { font-size: 40px; margin-bottom: 12px; }

.abolished-hidden { display: none !important; }

/* ═══════════════════════════════════
   PLM 스타일 오버라이드
═══════════════════════════════════ */

/* 네비 그림자 */
.topnav { box-shadow: 0 1px 0 var(--border), 0 2px 12px rgba(0,0,0,0.06); }

/* 스탯바 */
.stats-bar { box-shadow: 0 1px 0 var(--border); }
.stat-num { font-weight: 900; }
.conquest-pct { color: var(--accent); }
.conquest-bar-fill { background: linear-gradient(90deg, var(--accent), var(--gold)); }

/* 사이드 패널 */
.side-panel { box-shadow: -2px 0 12px rgba(0,0,0,0.06); }
.side-tab.active { color: var(--accent); border-bottom-color: var(--accent); }

/* 배지 & 태그 */
.badge { border: 1px solid var(--border); }
.badge.accent { background: var(--accent-glow); color: var(--accent); border-color: var(--accent); }
.badge.gold { background: var(--gold-dim); color: var(--gold); border-color: var(--gold); }
.badge.green { background: var(--green-dim); color: var(--green); border-color: var(--green); }

/* 정보 블록 */
.info-block { border: 1px solid var(--border); box-shadow: 0 1px 4px rgba(0,0,0,0.04); }
.unit-mini-card { box-shadow: 0 1px 4px rgba(0,0,0,0.06); }
.unit-mini-card:hover { border-color: var(--accent); box-shadow: 0 2px 12px var(--accent-glow); }

/* 액션 버튼 필 모양 */
.action-btn { border-radius: 9999px; font-weight: 500; }
.action-btn.primary { background: var(--accent); border-color: var(--accent); color: #fff; }
.action-btn.primary:hover { opacity: 0.88; }
.action-btn:hover { border-color: var(--accent); }

/* 모달 */
.modal { box-shadow: 0 8px 40px rgba(0,0,0,0.14); border-radius: 20px; }
.modal-close:hover { color: var(--accent); }

/* 토스트 */
.toast { border-radius: 9999px; font-weight: 600; }

/* 사이드 탭 */
.side-tab { font-weight: 500; }

<script>
/* ═══════════════════════════════════════════
   FIREBASE + IMJANG DATA (unchanged)
═══════════════════════════════════════════ */
const firebaseConfig = {
  apiKey: "AIzaSyDRnkAIYNXsKq77wE53y0qh2f92TT4zhxE",
  authDomain: "imjang-study.firebaseapp.com",
  databaseURL: "https://imjang-study-default-rtdb.firebaseio.com",
  projectId: "imjang-study",
  storageBucket: "imjang-study.firebasestorage.app",
  messagingSenderId: "380004830246",
  appId: "1:380004830246:web:4fe6955019b51b5425eae7"
};
firebase.initializeApp(firebaseConfig);
const db = firebase.database();
const REF = db.ref('imjang');

const KEY = 'imjang_data';
let D = JSON.parse(localStorage.getItem(KEY) || '{}');

if (!D.step1) D.step1 = {};
if (!D.step2) D.step2 = { units: [] };
if (!D.step3) D.step3 = { slots: [{},{},{},{}] };
if (!D.step4) D.step4 = { reviews: [{},{},{},{}] };
if (!D.step5) D.step5 = {};
if (!D.step6) D.step6 = { units: [], food: {} };
if (!D.doneDongs) D.doneDongs = [];
if (!D.archivedDongs) D.archivedDongs = [];

let selectedGu = null;
let currentSideTab = 'overview';
let priceChart = null;

REF.on('value', (snapshot) => {
  const remote = snapshot.val();
  if (!remote) return;
  D = remote;
  localStorage.setItem(KEY, JSON.stringify(D));
  updateStats();
  colorMap();
  if (selectedGu) loadSidePanel(selectedGu);
  showToast('🔄 데이터 업데이트됨');
});

function updateStats() {
  const conquered = D.doneDongs?.length || 0;
  const pending = D.step5?.dday && !D.step5.done ? 1 : 0;
  const units = D.step2?.units?.length || 0;
  document.getElementById('stat-conquered').textContent = conquered;
  document.getElementById('stat-pending').textContent = pending + (D.step3?.slots?.filter(s=>s.name).length ? 1 : 0);
  document.getElementById('stat-units').textContent = units;
  const pct = ((conquered / 424) * 100).toFixed(1);
  document.getElementById('conquest-fill').style.width = Math.min(pct * 20, 100) + '%';
  document.getElementById('conquest-pct').textContent = pct + '%';
}

function getGuStatus(guName) {
  const currentGu = D.step1?.gu;
  if (!currentGu) return 'untouched';
  if (D.step5?.done && currentGu === guName) return 'conquered';
  if (D.step5?.dday && currentGu === guName) return 'pending';
  if (D.step1?.dong && currentGu === guName) return 'exploring';
  return 'untouched';
}

const statusColors = {
  untouched: '#f0ece6',
  exploring: '#c8e8cc',
  pending:   '#fde8be',
  conquered: '#c8dcf5',
};

function colorMap() {
  document.querySelectorAll('.gu-region').forEach(el => {
    const gu = el.dataset.gu;
    const status = getGuStatus(gu);
    el.style.fill = statusColors[status];
    if (status === 'conquered') el.style.filter = 'url(#glow-pink)';
    else el.style.filter = '';
  });
}

document.querySelectorAll('.gu-region').forEach(el => {
  el.addEventListener('click', () => {
    selectedGu = el.dataset.gu;
    document.querySelectorAll('.gu-region').forEach(e => e.setAttribute('stroke-width','1.2'));
    el.setAttribute('stroke-width','2.5');
    el.setAttribute('stroke','#3d7fff');
    loadSidePanel(selectedGu);
  });
});

function switchSideTab(tab) {
  currentSideTab = tab;
  document.querySelectorAll('.side-tab').forEach((t,i) => {
    t.classList.toggle('active', ['overview','units','insights'][i] === tab);
  });
  if (selectedGu) loadSidePanel(selectedGu);
}

function loadSidePanel(gu) {
  const content = document.getElementById('side-content');
  const isCurrentGu = D.step1?.gu === gu;
  const status = getGuStatus(gu);

  if (currentSideTab === 'overview') {
    content.innerHTML = renderOverview(gu, status, isCurrentGu);
    if (isCurrentGu && D.step2?.units?.length) setTimeout(() => renderPriceChart(), 50);
  } else if (currentSideTab === 'units') {
    content.innerHTML = renderUnits(gu, isCurrentGu);
  } else if (currentSideTab === 'insights') {
    content.innerHTML = renderInsights(gu, isCurrentGu);
  }
}

function renderOverview(gu, status, isCurrent) {
  const statusLabel = { untouched:'미탐색', exploring:'탐색 중', pending:'발품 대기', conquered:'정복 완료' };
  const statusBadge = { untouched:'badge', exploring:'badge green', pending:'badge gold', conquered:'badge accent' };

  if (!isCurrent) {
    return `<div class="dong-header">
      <div class="dong-title">${gu}</div>
      <div class="dong-badges"><span class="badge">미탐색 구역</span></div>
    </div>
    <div style="color:var(--text3);font-size:13px;line-height:1.7;">
      아직 이 구에 대한 임장 기록이 없어요.<br>
      <a href="form.html" style="color:var(--accent);">손품 입력 →</a> 에서 ${gu} 데이터를 시작하세요.
    </div>`;
  }

  const s1 = D.step1 || {};
  const s2 = D.step2 || {};
  const s5 = D.step5 || {};
  const dong = s1.dong || '';
  const subways = s1.subway || [];
  const doubleStation = subways.length >= 2;
  const dday = s5.dday ? calcDday(s5.dday) : null;

  return `
    <div class="dong-header">
      <div class="dong-title">${gu} · ${dong}</div>
      <div class="dong-badges">
        <span class="${statusBadge[status]}">${statusLabel[status]}</span>
        ${doubleStation ? '<span class="badge accent">🚇 더블 역세권</span>' : ''}
        ${s1.reasonType ? `<span class="badge">${s1.reasonType}</span>` : ''}
        ${dday !== null ? `<span class="badge gold">${dday > 0 ? 'D-'+dday : dday === 0 ? 'D-Day 🔥' : '임장 완료'}</span>` : ''}
      </div>
    </div>
    ${s1.reason ? `<div class="info-section">
      <div class="info-section-title">📌 선정 배경 & 호재</div>

const GLOSSARY_KEY = 'imjang_glossary';
const CONSONANTS = ['전체','ㄱ','ㄴ','ㄷ','ㄹ','ㅁ','ㅂ','ㅅ','ㅇ','ㅈ','ㅊ','ㅋ','ㅌ','ㅍ','ㅎ','A-Z'];
const CONSO_MAP  = ['ㄱ','ㄲ','ㄴ','ㄷ','ㄸ','ㄹ','ㅁ','ㅂ','ㅃ','ㅅ','ㅆ','ㅇ','ㅈ','ㅉ','ㅊ','ㅋ','ㅌ','ㅍ','ㅎ'];

let glossaryData = JSON.parse(localStorage.getItem(GLOSSARY_KEY) || JSON.stringify([
  { id: 1, term: '갭투자', meaning: '전세를 끼고 매매하는 투자 방식. 매매가와 전세가의 차이(갭)만큼의 자금으로 집을 구매하는 방법으로, 전세 레버리지를 활용한다.', category: '#일반용어' },
  { id: 2, term: '규제지역', meaning: '투기과열지구, 조정대상지역, 투기지역 등 정부가 부동산 과열을 막기 위해 지정하는 지역. LTV·DTI·세금 등 여러 규제가 강화 적용된다.', category: '#일반용어' },
  { id: 3, term: '네이버부동산', meaning: '국내 최대 부동산 정보 포털. 실거래가·호가·단지정보 등을 제공하며 임장 전 손품의 핵심 도구.', category: '#일반용어' },
  { id: 4, term: 'DTI', meaning: '총부채상환비율(Debt To Income). 연소득 대비 연간 원리금 상환액의 비율. 대출 가능 한도를 제한하는 지표.', category: '#일반용어' },
  { id: 5, term: 'DSR', meaning: '총부채원리금상환비율(Debt Service Ratio). DTI보다 강화된 지표로, 모든 금융부채의 원리금을 연소득으로 나눈 비율.', category: '#일반용어' },
  { id: 6, term: 'LTV', meaning: '주택담보대출비율(Loan To Value). 주택 가격 대비 대출 가능 금액의 비율. 투기과열지구에서는 40~50%로 제한된다.', category: '#일반용어' },
  { id: 7, term: '임대차 3법', meaning: '계약갱신청구권제·전월세상한제·전월세신고제를 묶어 부르는 용어. 2020년 문재인 정부에서 세입자 보호를 위해 도입하였으나 이후 논란.', category: '#정부정책' },
  { id: 8, term: '특례보금자리론', meaning: '윤석열 정부가 2023년 출시한 정책 모기지. 9억 원 이하 주택, 최대 5억 원 한도로 저금리 대출 제공. 2024년 종료.', category: '#정부정책' },
]));

let selectedConso = '전체';

function saveGlossary() {
  localStorage.setItem(GLOSSARY_KEY, JSON.stringify(glossaryData));
}

function getInitial(str) {
  if (!str) return '';
  const c = str.charCodeAt(0);
  if (c >= 65 && c <= 90 || c >= 97 && c <= 122) return 'A-Z';
  const code = c - 44032;
  if (code < 0 || code > 11171) return str[0];
  return CONSO_MAP[Math.floor(code / 588)];
}

function normalizeConsonant(c) {
  // Map double consonants to base (ㄲ→ㄱ, ㄸ→ㄷ, etc.)
  const map = { 'ㄲ':'ㄱ','ㄸ':'ㄷ','ㅃ':'ㅂ','ㅆ':'ㅅ','ㅉ':'ㅈ' };
  return map[c] || c;
}

function buildConsonantFilter() {
  const container = document.getElementById('consonant-filter');
  container.innerHTML = CONSONANTS.map(c =>
    `<button class="conso-btn ${selectedConso === c ? 'active' : ''}"
      onclick="filterByConsonant('${c}')">${c}</button>`
  ).join('');
}

function filterByConsonant(c) {
  selectedConso = c;
  buildConsonantFilter();
  renderGlossary();
}

function addGlossaryItem() {
  const term = document.getElementById('g-term').value.trim();
  const meaning = document.getElementById('g-meaning').value.trim();
  const category = document.getElementById('g-category').value;

  if (!term || !meaning) { showToast('⚠️ 용어명과 설명을 입력해주세요'); return; }

  const id = Date.now();
  glossaryData.push({ id, term, meaning, category });
  saveGlossary();

  document.getElementById('g-term').value = '';
  document.getElementById('g-meaning').value = '';
  renderGlossary();
  showToast(`✅ "${term}" 등록 완료`);
}

function deleteGlossaryItem(id) {
  if (!confirm('이 용어를 삭제할까요?')) return;
  glossaryData = glossaryData.filter(g => g.id !== id);
  saveGlossary();
  renderGlossary();
  showToast('🗑️ 삭제되었습니다');
}

function renderGlossary() {
  buildConsonantFilter();

  const query = (document.getElementById('g-search')?.value || '').toLowerCase();
  const container = document.getElementById('glossary-cards');

  let items = [...glossaryData];

  // Filter by search query
  if (query) {
    items = items.filter(g =>
      g.term.toLowerCase().includes(query) ||
      g.meaning.toLowerCase().includes(query)
    );
  }

  // Filter by consonant
  if (selectedConso !== '전체') {
    items = items.filter(g => {
      const init = getInitial(g.term);
      const normInit = normalizeConsonant(init);
      if (selectedConso === 'A-Z') return init === 'A-Z';
      return normInit === selectedConso;
    });
  }

  // Sort: 가나다 order
  items.sort((a, b) => a.term.localeCompare(b.term, 'ko'));

  if (!items.length) {
    container.innerHTML = `<div class="glossary-empty">
      <div class="icon">📭</div>
      <div style="font-size:13px;margin-top:4px;">${query || selectedConso !== '전체' ? '검색 결과가 없습니다.' : '등록된 용어가 없습니다.<br>왼쪽 폼에서 첫 용어를 추가해보세요!'}</div>
    </div>`;
    return;
  }

  container.innerHTML = items.map(g => {
    const isGeneral = g.category === '#일반용어';
    const chipClass = isGeneral ? 'general' : 'policy';
    const initial = getInitial(g.term);
    return `<div class="glossary-card">
      <div class="glossary-card-initial">${initial}</div>
      <div class="glossary-card-body">
        <div class="glossary-card-term">
          ${g.term}
          <span class="cat-chip ${chipClass}">${g.category}</span>
        </div>
        <div class="glossary-card-meaning">${g.meaning}</div>
      </div>
      <div class="glossary-card-actions">
        <button class="icon-btn danger" onclick="deleteGlossaryItem(${g.id})" title="삭제">🗑</button>
      </div>
    </div>`;
  }).join('');
}

/* ═══════════════════════════════════════════
   ⚖️ POLICY TIMELINE
═══════════════════════════════════════════ */
const POLICY_KEY = 'imjang_policies';
const ADMIN_COLORS = ['admin-dot-0','admin-dot-1','admin-dot-2','admin-dot-3','admin-dot-4'];

let policyData = JSON.parse(localStorage.getItem(POLICY_KEY) || JSON.stringify([
  { id: 1, admin: '문재인 정부', name: '임대차 3법', date: '2020-07-31', status: 'abolished', memo: '계약갱신청구권제·전월세상한제·전월세신고제. 전월세 시장 불안 논란 속 2022년 이후 일부 완화.' },
  { id: 2, admin: '문재인 정부', name: 'LTV·DTI·DSR 규제 강화', date: '2017-08-02', status: 'abolished', memo: '투기과열지구 LTV 40%, 비규제지역 70% 적용. 이후 윤석열 정부에서 대폭 완화.' },
  { id: 3, admin: '문재인 정부', name: '종합부동산세 강화', date: '2018-09-13', status: 'abolished', memo: '다주택자 종부세 세율 최고 3.2%까지 인상. 2022년 이후 단계적 완화.' },
  { id: 4, admin: '윤석열 정부', name: '규제지역 전면 해제', date: '2023-01-05', status: 'active', memo: '강남3구(강남·서초·송파)·용산구 제외 전국 규제지역 전면 해제. LTV 70% 적용.' },
  { id: 5, admin: '윤석열 정부', name: '특례보금자리론', date: '2023-01-30', status: 'abolished', memo: '9억 이하 주택, 최대 5억 한도. 연 4% 초반 고정금리 제공. 수요 급증으로 2024년 조기 종료.' },
  { id: 6, admin: '윤석열 정부', name: '1기 신도시 재건축 선도지구', date: '2024-12-10', status: 'active', memo: '분당·일산·평촌·산본·중동 등 1기 신도시 선도지구 최종 선정. 용적률 상향 특례 부여.' },
]));

let editingPolicyId = null;

function savePolicy() {
  localStorage.setItem(POLICY_KEY, JSON.stringify(policyData));
}

function getAdminList() {
  return [...new Set(policyData.map(p => p.admin))];
}

function openPolicyModal(id = null) {
  editingPolicyId = id;
  const modal = document.getElementById('modal-policy');
  const title = document.getElementById('policy-modal-title');

  // Populate datalist
  const dl = document.getElementById('admin-list');
  dl.innerHTML = getAdminList().map(a => `<option value="${a}">`).join('');

  if (id) {
    const item = policyData.find(p => p.id === id);
    if (!item) return;
    title.textContent = '정책 수정';
    document.getElementById('p-admin').value = item.admin;
    document.getElementById('p-name').value = item.name;
    document.getElementById('p-date').value = item.date;
    document.getElementById('p-status').value = item.status;
    document.getElementById('p-memo').value = item.memo || '';
  } else {
    title.textContent = '정책 추가';
    document.getElementById('p-admin').value = '';
    document.getElementById('p-name').value = '';
    document.getElementById('p-date').value = '';
    document.getElementById('p-status').value = 'active';
    document.getElementById('p-memo').value = '';
  }

  modal.classList.add('open');
}

function closePolicyModal() {
  document.getElementById('modal-policy').classList.remove('open');
  editingPolicyId = null;
}

document.getElementById('modal-policy').addEventListener('click', e => {
  if (e.target === e.currentTarget) closePolicyModal();
});

function savePolicyItem() {
  const admin  = document.getElementById('p-admin').value.trim();
  const name   = document.getElementById('p-name').value.trim();
  const date   = document.getElementById('p-date').value;
  const status = document.getElementById('p-status').value;
  const memo   = document.getElementById('p-memo').value.trim();

  if (!admin || !name || !date) { showToast('⚠️ 정권명, 정책명, 발표일은 필수입니다'); return; }

  if (editingPolicyId) {
    const idx = policyData.findIndex(p => p.id === editingPolicyId);
    if (idx !== -1) policyData[idx] = { id: editingPolicyId, admin, name, date, status, memo };
    showToast(`✅ "${name}" 수정 완료`);
  } else {
    policyData.push({ id: Date.now(), admin, name, date, status, memo });
    showToast(`✅ "${name}" 추가 완료`);
  }

  savePolicy();
  closePolicyModal();
  renderPolicy();
}

function deletePolicyItem(id) {
  if (!confirm('이 정책을 삭제할까요?')) return;
  policyData = policyData.filter(p => p.id !== id);
  savePolicy();
  renderPolicy();
  showToast('🗑️ 삭제되었습니다');
}

function renderPolicy() {
  const showAbandoned = document.getElementById('show-abolished').checked;
  const container = document.getElementById('policy-content');

  // Count abolished
  const abolishedCount = policyData.filter(p => p.status === 'abolished').length;
  const countEl = document.getElementById('policy-abolished-count');
  countEl.textContent = abolishedCount
    ? `폐지된 정책 ${abolishedCount}건 ${showAbandoned ? '표시 중' : '숨김'}`
    : '';

  if (!policyData.length) {
    container.innerHTML = `<div class="policy-empty">
      <div class="icon">⚖️</div>
      <div style="font-size:13px;margin-top:4px;">등록된 정책이 없습니다.<br>상단의 <strong>+ 정책 추가</strong> 버튼으로 첫 정책을 입력해보세요.</div>
    </div>`;
    return;
  }

  // Group by admin, preserve order of first appearance
  const adminOrder = [];
  const grouped = {};
  policyData.forEach(p => {
    if (!grouped[p.admin]) {
      grouped[p.admin] = [];
      adminOrder.push(p.admin);
    }
    grouped[p.admin].push(p);
  });

  // Sort each group by date desc (most recent first)
  adminOrder.forEach(a => {
    grouped[a].sort((x, y) => new Date(y.date) - new Date(x.date));
  });

  let html = '';
  adminOrder.forEach((admin, adminIdx) => {
    const items = grouped[admin];
    const colorClass = ADMIN_COLORS[adminIdx % ADMIN_COLORS.length];

    const cards = items.map(p => {
      const isAbandoned = p.status === 'abolished';
      const hideClass = (isAbandoned && !showAbandoned) ? 'abolished-hidden' : '';
      const cardClass = isAbandoned ? 'abolished' : 'active-policy';
      const statusLabel = isAbandoned ? '폐지됨' : '현재 적용 중';
      const statusBadge = isAbandoned ? 'abolished' : 'active';

      return `<div class="policy-card ${cardClass} ${hideClass}" data-id="${p.id}">
        <div class="policy-card-head">
          <div class="policy-name">${p.name}</div>
          <span class="policy-status-badge ${statusBadge}">${statusLabel}</span>
        </div>
        <div class="policy-meta">
          <span>📅 ${p.date}</span>
          <span>·</span>
          <span>${admin}</span>
        </div>
        ${p.memo ? `<div class="policy-memo">${p.memo}</div>` : ''}
        <div class="policy-card-actions">
          <button class="icon-btn" onclick="openPolicyModal(${p.id})" title="수정">✏️</button>
          <button class="icon-btn danger" onclick="deletePolicyItem(${p.id})" title="삭제">🗑</button>
        </div>
      </div>`;
    }).join('');

    // Count visible items for this admin group
    const visibleCount = items.filter(p => p.status === 'active' || showAbandoned).length;
    const groupHidden = visibleCount === 0;

    html += `<div class="admin-group" ${groupHidden ? 'style="display:none"' : ''}>
      <div class="admin-header">
        <div class="admin-dot ${colorClass}"></div>
        <div>
          <div class="admin-name">${admin}</div>
          <div class="admin-period">${items.length}건 · 적용중 ${items.filter(p=>p.status==='active').length}건</div>
        </div>
      </div>
      <div class="timeline-track">
        ${cards}
      </div>
    </div>`;
  });

  container.innerHTML = html;
}

// Initialize
buildConsonantFilter();
</script>
