<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>임장노트 — 대시보드</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;500;700;900&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
<style>
:root {
  --bg: #0c0f1a;
  --surf: #131729;
  --surf2: #1c2235;
  --surf3: #252d42;
  --surf4: #2e3850;
  --border: #2a3348;
  --accent: #3d7fff;
  --accent-glow: #3d7fff22;
  --gold: #f5b731;
  --gold-dim: #f5b73115;
  --green: #2ecc8f;
  --green-dim: #2ecc8f15;
  --red: #f05c5c;
  --text: #e4e8f4;
  --text2: #8892aa;
  --text3: #4a5470;
  --r: 10px;
  --r-sm: 6px;

  --color-untouched: #1c2235;
  --color-exploring: #2a3d1a;
  --color-pending: #3d3010;
  --color-conquered: #1a2e50;
}
* { box-sizing: border-box; margin: 0; padding: 0; }
body {
  font-family: 'Noto Sans KR', sans-serif;
  background: var(--bg);
  color: var(--text);
  height: 100vh;
  overflow: hidden;
  display: flex;
  flex-direction: column;
  font-size: 14px;
}

.topnav {
  height: 52px; min-height: 52px;
  background: var(--surf);
  border-bottom: 1px solid var(--border);
  display: flex; align-items: center; justify-content: space-between;
  padding: 0 24px; flex-shrink: 0;
}
.topnav-logo { font-size: 15px; font-weight: 700; color: var(--gold); }
.nav-links { display: flex; gap: 6px; }
.nav-link {
  padding: 6px 14px; border-radius: var(--r-sm); font-size: 13px;
  color: var(--text2); text-decoration: none; cursor: pointer; transition: all 0.15s;
}
.nav-link:hover { background: var(--surf3); color: var(--text); }
.nav-link.here { background: var(--surf3); color: var(--accent); font-weight: 500; }

.stats-bar {
  background: var(--surf);
  border-bottom: 1px solid var(--border);
  display: flex; align-items: center;
  padding: 0 24px; gap: 0; flex-shrink: 0; height: 52px;
}
.stat-item {
  padding: 0 20px; border-right: 1px solid var(--border);
  display: flex; align-items: center; gap: 10px;
}
.stat-item:first-child { padding-left: 0; }
.stat-num { font-size: 22px; font-weight: 700; line-height: 1; }
.stat-label { font-size: 11px; color: var(--text3); line-height: 1.3; }
.conquest-bar-wrap {
  flex: 1; margin-left: 20px;
  display: flex; align-items: center; gap: 12px;
}
.conquest-label { font-size: 12px; color: var(--text2); white-space: nowrap; }
.conquest-bar-bg {
  flex: 1; height: 6px; background: var(--surf3); border-radius: 3px; overflow: hidden;
}
.conquest-bar-fill {
  height: 100%; background: linear-gradient(90deg, var(--accent), var(--gold));
  border-radius: 3px; transition: width 0.8s ease;
}
.conquest-pct { font-size: 13px; font-weight: 700; color: var(--gold); white-space: nowrap; }

.main-layout { flex: 1; display: flex; overflow: hidden; }

.map-area {
  flex: 1; position: relative;
  background: var(--bg);
  display: flex; align-items: center; justify-content: center;
  overflow: hidden;
}
.map-container { position: relative; width: 100%; height: 100%; }
#seoul-svg { width: 100%; height: 100%; object-fit: contain; }
.map-overlay-label {
  position: absolute; top: 16px; left: 16px;
  font-size: 11px; color: var(--text3);
  display: flex; gap: 12px;
}
.legend-item { display: flex; align-items: center; gap: 5px; }
.legend-dot { width: 10px; height: 10px; border-radius: 2px; }

.side-panel {
  width: 380px; min-width: 380px;
  border-left: 1px solid var(--border);
  background: var(--surf);
  display: flex; flex-direction: column;
  overflow: hidden;
}
.side-tabs { display: flex; border-bottom: 1px solid var(--border); flex-shrink: 0; }
.side-tab {
  flex: 1; padding: 12px 8px; text-align: center; font-size: 12px;
  color: var(--text3); cursor: pointer; border-bottom: 2px solid transparent;
  transition: all 0.15s;
}
.side-tab:hover { color: var(--text2); }
.side-tab.active { color: var(--accent); border-bottom-color: var(--accent); font-weight: 500; }
.side-content { flex: 1; overflow-y: auto; padding: 20px; }
.side-content::-webkit-scrollbar { width: 4px; }
.side-content::-webkit-scrollbar-thumb { background: var(--surf3); border-radius: 2px; }

.dong-header { margin-bottom: 18px; }
.dong-title { font-size: 20px; font-weight: 700; margin-bottom: 6px; }
.dong-badges { display: flex; gap: 6px; flex-wrap: wrap; }
.badge { font-size: 11px; padding: 3px 10px; border-radius: 20px; background: var(--surf3); color: var(--text2); }
.badge.accent { background: var(--accent-glow); color: var(--accent); }
.badge.gold { background: var(--gold-dim); color: var(--gold); }
.badge.green { background: var(--green-dim); color: var(--green); }

.info-section { margin-bottom: 20px; }
.info-section-title {
  font-size: 11px; color: var(--text3); font-weight: 600;
  text-transform: uppercase; letter-spacing: 0.8px; margin-bottom: 10px;
}
.info-block { background: var(--surf2); border-radius: var(--r-sm); padding: 12px 14px; font-size: 13px; color: var(--text); line-height: 1.6; }
.tag-list { display: flex; flex-wrap: wrap; gap: 5px; }
.tag { padding: 3px 10px; border-radius: 20px; font-size: 11px; background: var(--surf3); color: var(--text2); }
.tag.subway { background: #1a2d50; color: #90bdf7; }
.tag.park { background: #1a2e1a; color: #90d790; }
.tag.risk { background: #2e1a1a; color: #f09090; }
.tag.pro { background: #1a2e1a; color: var(--green); }

.unit-mini-card {
  background: var(--surf2); border: 1px solid var(--border);
  border-radius: var(--r-sm); padding: 12px 14px; margin-bottom: 8px;
  cursor: pointer; transition: border-color 0.15s;
}
.unit-mini-card:hover { border-color: var(--accent); }
.unit-mini-top { display: flex; justify-content: space-between; align-items: center; margin-bottom: 6px; }
.unit-mini-name { font-size: 14px; font-weight: 600; }

.action-btn {
  width: 100%; padding: 10px; border-radius: var(--r-sm);
  border: 1px solid var(--border); background: var(--surf2);
  color: var(--text2); cursor: pointer; font-family: inherit; font-size: 13px;
  transition: all 0.15s; margin-top: 8px; text-decoration: none; display: block; text-align: center;
}
.action-btn:hover { background: var(--surf3); color: var(--text); border-color: var(--accent); }
.action-btn.primary { background: var(--accent-glow); border-color: var(--accent); color: var(--accent); }

.chart-wrap { background: var(--surf2); border-radius: var(--r-sm); padding: 14px; margin-bottom: 16px; }

.empty-side {
  display: flex; flex-direction: column; align-items: center; justify-content: center;
  height: 100%; color: var(--text3); text-align: center; padding: 40px;
}
.empty-side .icon { font-size: 40px; margin-bottom: 12px; }
.empty-side p { font-size: 13px; line-height: 1.7; }

.modal-bg {
  display: none; position: fixed; inset: 0; background: #00000088;
  z-index: 100; align-items: center; justify-content: center;
}
.modal-bg.open { display: flex; }
.modal {
  background: var(--surf); border: 1px solid var(--border);
  border-radius: 16px; width: 640px; max-height: 85vh;
  overflow-y: auto; padding: 28px;
}
.modal-head { display: flex; justify-content: space-between; margin-bottom: 22px; }
.modal-title { font-size: 20px; font-weight: 700; }
.modal-close { background: none; border: none; color: var(--text3); cursor: pointer; font-size: 20px; }
.info-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
.info-cell { background: var(--surf2); border-radius: 8px; padding: 11px 14px; }
.info-key { font-size: 11px; color: var(--text3); margin-bottom: 4px; }
.info-val { font-size: 14px; font-weight: 500; }

.toast {
  position: fixed; top: 20px; right: 24px; z-index: 200;
  background: var(--green); color: #fff; font-size: 13px; font-weight: 500;
  padding: 10px 18px; border-radius: var(--r-sm);
  opacity: 0; pointer-events: none; transition: opacity 0.3s;
}
.toast.show { opacity: 1; }

.dong-region { cursor: pointer; transition: opacity 0.2s; }
.dong-region:hover { opacity: 0.75; }
</style>

<script>
const firebaseConfig = {
  apiKey: "AIzaSyDRnkAIYNXsKq77wE53y0qh2f92TT4zhxE",
  authDomain: "imjang-study.firebaseapp.com",
  databaseURL: "https://imjang-study-default-rtdb.firebaseio.com",
  projectId: "imjang-study",
  storageBucket: "imjang-study.firebasestorage.app",
  messagingSenderId: "380004830246",
  appId: "1:380004830246:web:4fe6955019b51b5425eae7"
};
firebase.initializeApp(firebaseConfig);
const db = firebase.database();
const REF = db.ref('imjang');

const KEY = 'imjang_data';
let D = JSON.parse(localStorage.getItem(KEY) || '{}');

if (!D.step1) D.step1 = {};
if (!D.step2) D.step2 = { units: [] };
if (!D.step3) D.step3 = { slots: [{},{},{},{}] };
if (!D.step4) D.step4 = { reviews: [{},{},{},{}] };
if (!D.step5) D.step5 = {};
if (!D.step6) D.step6 = { units: [], food: {} };
if (!D.doneDongs) D.doneDongs = [];
if (!D.archivedDongs) D.archivedDongs = [];

let selectedGu = null;
let currentSideTab = 'overview';
let priceChart = null;

REF.on('value', (snapshot) => {
  const remote = snapshot.val();
  if (!remote) return;
  D = remote;
  localStorage.setItem(KEY, JSON.stringify(D));
  updateStats();
  colorMap();
  if (selectedGu) loadSidePanel(selectedGu);
  showToast('🔄 데이터 업데이트됨');
});

function updateStats() {
  const conquered = D.doneDongs?.length || 0;
  const pending = D.step5?.dday && !D.step5.done ? 1 : 0;
  const units = D.step2?.units?.length || 0;
  document.getElementById('stat-conquered').textContent = conquered;
  document.getElementById('stat-pending').textContent = pending + (D.step3?.slots?.filter(s=>s.name).length ? 1 : 0);
  document.getElementById('stat-units').textContent = units;
  const pct = ((conquered / 424) * 100).toFixed(1);
  document.getElementById('conquest-fill').style.width = Math.min(pct * 20, 100) + '%';
  document.getElementById('conquest-pct').textContent = pct + '%';
}

function getGuStatus(guName) {
  const currentGu = D.step1?.gu;
  if (!currentGu) return 'untouched';
  if (D.step5?.done && currentGu === guName) return 'conquered';
  if (D.step5?.dday && currentGu === guName) return 'pending';
  if (D.step1?.dong && currentGu === guName) return 'exploring';
  return 'untouched';
}

const statusColors = {
  untouched: '#1c2235',
  exploring: '#2a4d1a',
  pending: '#4a3d10',
  conquered: '#1a3a70',
};

function colorMap() {
  document.querySelectorAll('.gu-region').forEach(el => {
    const gu = el.dataset.gu;
    const status = getGuStatus(gu);
    el.style.fill = statusColors[status];
    if (status === 'conquered') el.style.filter = 'url(#glow)';
  });
}

document.querySelectorAll('.gu-region').forEach(el => {
  el.addEventListener('click', () => {
    selectedGu = el.dataset.gu;
    document.querySelectorAll('.gu-region').forEach(e => e.setAttribute('stroke-width','1.2'));
    el.setAttribute('stroke-width','2.5');
    el.setAttribute('stroke','#3d7fff');
    loadSidePanel(selectedGu);
  });
});

function switchSideTab(tab) {
  currentSideTab = tab;
  document.querySelectorAll('.side-tab').forEach((t,i) => {
    t.classList.toggle('active', ['overview','units','insights'][i] === tab);
  });
  if (selectedGu) loadSidePanel(selectedGu);
}

function loadSidePanel(gu) {
  const content = document.getElementById('side-content');
  const isCurrentGu = D.step1?.gu === gu;
  const status = getGuStatus(gu);

  if (currentSideTab === 'overview') {
    content.innerHTML = renderOverview(gu, status, isCurrentGu);
    if (isCurrentGu && D.step2?.units?.length) setTimeout(() => renderPriceChart(), 50);
  } else if (currentSideTab === 'units') {
    content.innerHTML = renderUnits(gu, isCurrentGu);
  } else if (currentSideTab === 'insights') {
    content.innerHTML = renderInsights(gu, isCurrentGu);
  }
}

function renderOverview(gu, status, isCurrent) {
  const statusLabel = { untouched:'미탐색', exploring:'탐색 중', pending:'발품 대기', conquered:'정복 완료' };
  const statusBadge = { untouched:'badge', exploring:'badge green', pending:'badge gold', conquered:'badge accent' };

  if (!isCurrent) {
    return `<div class="dong-header">
      <div class="dong-title">${gu}</div>
      <div class="dong-badges"><span class="badge">미탐색 구역</span></div>
    </div>
    <div style="color:var(--text3);font-size:13px;line-height:1.7;">
      아직 이 구에 대한 임장 기록이 없어요.<br>
      <a href="form.html" style="color:var(--accent);">손품 입력 →</a> 에서 ${gu} 데이터를 시작하세요.
    </div>`;
  }

  const s1 = D.step1 || {};
  const s2 = D.step2 || {};
  const s5 = D.step5 || {};
  const dong = s1.dong || '';
  const subways = s1.subway || [];
  const doubleStation = subways.length >= 2;
  const dday = s5.dday ? calcDday(s5.dday) : null;

  return `
    <div class="dong-header">
      <div class="dong-title">${gu} · ${dong}</div>
      <div class="dong-badges">
        <span class="${statusBadge[status]}">${statusLabel[status]}</span>
        ${doubleStation ? '<span class="badge accent">🚇 더블 역세권</span>' : ''}
        ${s1.reasonType ? `<span class="badge">${s1.reasonType}</span>` : ''}
        ${dday !== null ? `<span class="badge gold">${dday > 0 ? 'D-'+dday : dday === 0 ? 'D-Day 🔥' : '임장 완료'}</span>` : ''}
      </div>
    </div>
    ${s1.reason ? `<div class="info-section">
      <div class="info-section-title">📌 선정 배경 & 호재</div>
      <div class="info-block">${s1.reason}</div>
    </div>` : ''}
    ${subways.length ? `<div class="info-section">
      <div class="info-section-title">🚇 교통 인프라</div>
      <div class="tag-list">
        ${subways.map(s => `<span class="tag subway">${s}</span>`).join('')}
        ${(s1.park||[]).map(p => `<span class="tag park">${p}</span>`).join('')}
        ${(s1.landmark||[]).map(l => `<span class="tag">${l}</span>`).join('')}
      </div>
    </div>` : ''}
    ${s2.avgPrice ? `<div class="info-section">
      <div class="info-section-title">💰 동네 시세 요약</div>
      <div style="display:grid;grid-template-columns:1fr 1fr;gap:8px;">
        <div class="info-block" style="text-align:center;">
          <div style="font-size:10px;color:var(--text3);margin-bottom:4px;">평균 평당가</div>
          <div style="font-size:18px;font-weight:700;color:var(--gold);">${Number(s2.avgPrice).toLocaleString()}<span style="font-size:11px;font-weight:400;">만</span></div>
        </div>
        <div class="info-block" style="text-align:center;">
          <div style="font-size:10px;color:var(--text3);margin-bottom:4px;">평균 전세가율</div>
          <div style="font-size:18px;font-weight:700;color:var(--accent);">${s2.leaseRate}<span style="font-size:11px;font-weight:400;">%</span></div>
        </div>
      </div>
    </div>` : ''}
    ${s2.units?.length ? `<div class="info-section">
      <div class="info-section-title">📊 단지 시세 차트</div>
      <div class="chart-wrap"><canvas id="price-chart" height="160"></canvas></div>
    </div>` : ''}
    ${s5.dday ? `<div class="info-section">
      <div class="info-section-title">🏃‍♀️ 발품 정보</div>
      <div class="info-block">
        <div style="margin-bottom:6px;">📅 임장일: <strong>${s5.dday}</strong></div>
        ${s5.start ? `<div style="margin-bottom:6px;">📍 출발: ${s5.start}</div>` : ''}
        ${s5.route ? `<div style="font-size:12px;color:var(--text2);">🗺️ ${s5.route}</div>` : ''}
      </div>
      ${s5.naverLink ? `<a href="${s5.naverLink}" target="_blank" class="action-btn">🏃‍♂️ 네이버 지도로 동선 열기</a>` : ''}
    </div>` : ''}
    ${D.step6?.food?.name ? `<div class="info-section">
      <div class="info-section-title">🍽️ 이번 임장 맛집</div>
      <div class="info-block">
        <div style="font-size:15px;font-weight:600;margin-bottom:4px;">🎁 ${D.step6.food.name}</div>
        ${D.step6.food.menu ? `<div style="font-size:12px;color:var(--text2);">추천 메뉴: ${D.step6.food.menu}</div>` : ''}
        ${D.step6.food.memo ? `<div style="font-size:12px;color:var(--text3);margin-top:4px;">${D.step6.food.memo}</div>` : ''}
      </div>
    </div>` : ''}
    <a href="form.html" class="action-btn primary">✏️ 입력 폼에서 수정하기</a>
  `;
}

function renderUnits(gu, isCurrent) {
  if (!isCurrent) return `<div style="color:var(--text3);font-size:13px;padding:20px 0;">이 구의 단지 기록이 없어요.</div>`;
  const slots = D.step3?.slots || [];
  if (!slots.some(s => s.name)) return `<div style="color:var(--text3);font-size:13px;padding:20px 0;">3단계에서 타깃 단지를 선정하면 여기에 표시됩니다.</div>`;

  const SLOT_ICONS = ['👑','🏢','🏢','💰'];
  return `
    <div style="font-size:12px;color:var(--text3);margin-bottom:14px;">${D.step1?.dong || ''} 핵심 타깃 단지</div>
    ${slots.map((s,i) => {
      if (!s.name) return '';
      const rv = D.step4?.reviews?.[i] || {};
      const fu = D.step6?.units?.[i] || {};
      const avgScore = fu.traffic || fu.school || fu.commerce || fu.env
        ? ((parseInt(fu.traffic||0) + parseInt(fu.school||0) + parseInt(fu.commerce||0) + parseInt(fu.env||0)) / 4).toFixed(1)
        : null;
      const gap = (s.sale && s.lease) ? (parseFloat(s.sale) - parseFloat(s.lease)).toFixed(1) : null;
      const ppu = (s.pyeong && s.sale) ? Math.round(parseFloat(s.sale) * 10000 / parseFloat(s.pyeong)) : s.ppu || null;
      return `<div class="unit-mini-card" onclick="openUnitModal(${i})">
        <div class="unit-mini-top">
          <div class="unit-mini-name">${SLOT_ICONS[i]} ${s.name}</div>
          ${avgScore ? `<div style="font-size:12px;color:var(--gold);">★ ${avgScore}</div>` : ''}
        </div>
        <div style="font-size:12px;color:var(--text2);margin-bottom:8px;">
          ${ppu ? `평당 ${Number(ppu).toLocaleString()}만` : ''}
          ${s.sale ? ` · 매매 ${s.sale}억` : ''}
          ${gap ? ` · 갭 ${gap}억` : ''}
        </div>
        ${rv.pros?.length ? `<div class="tag-list" style="margin-bottom:6px;">${rv.pros.slice(0,3).map(p=>`<span class="tag pro">${p}</span>`).join('')}</div>` : ''}
        ${rv.cons?.length ? `<div class="tag-list">${rv.cons.slice(0,2).map(c=>`<span class="tag risk">${c}</span>`).join('')}</div>` : ''}
      </div>`;
    }).join('')}
  `;
}

function renderInsights(gu, isCurrent) {
  if (!isCurrent) return `<div style="color:var(--text3);font-size:13px;padding:20px 0;">이 구의 인사이트 기록이 없어요.</div>`;
  const slots = D.step3?.slots || [];
  const reviews = D.step4?.reviews || [];
  const fu = D.step6?.units || [];

  let html = '';
  slots.forEach((s,i) => {
    if (!s.name) return;
    const rv = reviews[i] || {};
    const f = fu[i] || {};
    if (!rv.summary && !f.comment) return;
    html += `<div style="background:var(--surf2);border-radius:var(--r-sm);padding:14px;margin-bottom:12px;">
      <div style="font-size:13px;font-weight:600;margin-bottom:8px;">📌 ${s.name}</div>
      ${rv.summary ? `<div style="font-size:12px;color:var(--text2);margin-bottom:8px;line-height:1.6;border-left:2px solid var(--accent);padding-left:10px;">${rv.summary}</div>` : ''}
      ${f.comment ? `<div style="font-size:12px;color:var(--gold);border-left:2px solid var(--gold);padding-left:10px;line-height:1.6;">🏃 현장: ${f.comment}</div>` : ''}
    </div>`;
  });

  if (D.step5?.memo) {
    html += `<div style="background:var(--surf2);border-radius:var(--r-sm);padding:14px;margin-bottom:12px;">
      <div style="font-size:12px;color:var(--text3);margin-bottom:6px;">최종 메모</div>
      <div style="font-size:13px;color:var(--text);line-height:1.6;">${D.step5.memo}</div>
    </div>`;
  }

  return html || `<div style="color:var(--text3);font-size:13px;padding:20px 0;">4단계 후기 수집 및 발품 기록이 완료되면 인사이트가 쌓입니다.</div>`;
}

function renderPriceChart() {
  const units = (D.step2?.units || []).filter(u => u.name && u.sale);
  if (!units.length) return;
  const sorted = [...units].sort((a,b) => parseFloat(b.sale||0) - parseFloat(a.sale||0));
  const ctx = document.getElementById('price-chart');
  if (!ctx) return;
  if (priceChart) priceChart.destroy();
  priceChart = new Chart(ctx, {
    type: 'bar',
    data: {
      labels: sorted.map(u => u.name.length > 6 ? u.name.slice(0,6)+'…' : u.name),
      datasets: [
        { label: '매매호가(억)', data: sorted.map(u => parseFloat(u.sale||0)), backgroundColor: '#3d7fff55', borderColor: '#3d7fff', borderWidth: 1 },
        { label: '전세호가(억)', data: sorted.map(u => parseFloat(u.lease||0)), backgroundColor: '#f5b73133', borderColor: '#f5b731', borderWidth: 1 },
      ]
    },
    options: {
      responsive: true,
      plugins: { legend: { labels: { color: '#8892aa', font: { size: 11 } } } },
      scales: {
        x: { ticks: { color: '#8892aa', font: { size: 10 } }, grid: { color: '#2a3348' } },
        y: { ticks: { color: '#8892aa', font: { size: 10 } }, grid: { color: '#2a3348' } },
      }
    }
  });
}

const SLOT_ICONS = ['👑','🏢','🏢','💰'];
const SLOT_LABELS = ['지역 대장','우량 단지①','우량 단지②','가성비 단지'];

function openUnitModal(idx) {
  const s = D.step3?.slots?.[idx] || {};
  const rv = D.step4?.reviews?.[idx] || {};
  const fu = D.step6?.units?.[idx] || {};
  if (!s.name) return;

  const ppu = (s.pyeong && s.sale)
    ? Math.round(parseFloat(s.sale) * 10000 / parseFloat(s.pyeong)).toLocaleString('ko-KR') + '만'
    : (s.ppu ? Number(s.ppu).toLocaleString() + '만' : '—');

  const scores = ['교통','학군','상권','환경'].map((lbl,i) => {
    const keys = ['traffic','school','commerce','env'];
    const val = fu[keys[i]] || 0;
    return `<div style="flex:1;text-align:center;background:var(--surf3);border-radius:8px;padding:10px;">
      <div style="font-size:10px;color:var(--text3);margin-bottom:4px;">${lbl}</div>
      <div style="font-size:18px;color:var(--gold);">${'★'.repeat(val)}${'☆'.repeat(5-val)}</div>
    </div>`;
  }).join('');

  document.getElementById('modal-unit-content').innerHTML = `
    <div class="modal-head">
      <div>
        <div class="modal-title">${SLOT_ICONS[idx]} ${s.name}</div>
        <div style="font-size:13px;color:var(--text2);margin-top:4px;">${SLOT_LABELS[idx]}</div>
      </div>
      <button class="modal-close" onclick="closeModal()">✕</button>
    </div>
    <div class="info-section">
      <div class="info-section-title">매물 정보</div>
      <div class="info-grid">
        <div class="info-cell"><div class="info-key">평당가</div><div class="info-val">${ppu}</div></div>
        <div class="info-cell"><div class="info-key">매매호가</div><div class="info-val">${s.sale ? s.sale+'억' : '—'}</div></div>
        <div class="info-cell"><div class="info-key">전세호가</div><div class="info-val">${s.lease ? s.lease+'억' : '—'}</div></div>
        <div class="info-cell"><div class="info-key">투자 갭</div><div class="info-val" style="color:var(--gold)">${(s.sale&&s.lease) ? (parseFloat(s.sale)-parseFloat(s.lease)).toFixed(1)+'억' : '—'}</div></div>
        <div class="info-cell"><div class="info-key">세대수</div><div class="info-val">${s.units ? s.units+'세대' : '—'}</div></div>
        <div class="info-cell"><div class="info-key">준공</div><div class="info-val">${s.built || '—'}</div></div>
      </div>
    </div>
    ${fu.traffic || fu.school ? `<div class="info-section">
      <div class="info-section-title">🏃 현장 별점</div>
      <div style="display:flex;gap:8px;">${scores}</div>
      ${fu.priceMatch ? `<div style="margin-top:10px;font-size:13px;color:var(--text2);">호가 일치: <strong style="color:var(--text)">${fu.priceMatch}</strong></div>` : ''}
      ${fu.comment ? `<div style="margin-top:10px;font-size:13px;line-height:1.6;background:var(--surf3);padding:12px;border-radius:8px;">${fu.comment}</div>` : ''}
    </div>` : ''}
    ${rv.pros?.length || rv.cons?.length ? `<div class="info-section">
      <div class="info-section-title">후기 분석</div>
      ${rv.pros?.length ? `<div style="margin-bottom:8px;"><div style="font-size:11px;color:var(--green);margin-bottom:5px;">장점</div><div class="tag-list">${rv.pros.map(p=>`<span class="tag pro">${p}</span>`).join('')}</div></div>` : ''}
      ${rv.cons?.length ? `<div><div style="font-size:11px;color:var(--red);margin-bottom:5px;">리스크</div><div class="tag-list">${rv.cons.map(c=>`<span class="tag risk">${c}</span>`).join('')}</div></div>` : ''}
      ${rv.summary ? `<div style="margin-top:10px;font-size:13px;color:var(--text);line-height:1.6;background:var(--surf3);padding:12px;border-radius:8px;">${rv.summary}</div>` : ''}
    </div>` : ''}
  `;
  document.getElementById('modal-unit').classList.add('open');
}
function closeModal() { document.getElementById('modal-unit').classList.remove('open'); }
document.getElementById('modal-unit').addEventListener('click', e => { if (e.target === e.currentTarget) closeModal(); });

function calcDday(dateStr) {
  const today = new Date(); today.setHours(0,0,0,0);
  const target = new Date(dateStr); target.setHours(0,0,0,0);
  return Math.floor((target - today) / 86400000);
}
function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg; t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 3000);
}

updateStats();
colorMap();

if (D.step1?.gu) {
  selectedGu = D.step1.gu;
  const guEl = document.querySelector(`[data-gu="${D.step1.gu}"]`);
  if (guEl) {
    guEl.setAttribute('stroke-width','2.5');
    guEl.setAttribute('stroke','#3d7fff');
    loadSidePanel(D.step1.gu);
  }
}

if (D.step5?.done && !sessionStorage.getItem('toastShown')) {
  setTimeout(() => {
    showToast(`🎉 ${D.step1?.dong || ''} 정복 완료! 서울 정복률 ${((D.doneDongs?.length||1) / 424 * 100).toFixed(1)}% 달성!`);
    sessionStorage.setItem('toastShown','1');
  }, 800);
}
</script>
</body>
</html>
